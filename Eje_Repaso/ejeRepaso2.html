<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repaso: Unidad 2 - Sistemas y Auditoría</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --primary: #004F67;
            --primary-dark: #00779A;
        }

        body {
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            line-height: 1.6;
            color: #004F67;
            background-color: #f0f5f5;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        #main-container {
            width: 95%;
            max-width: 1000px;
            height: 850px; 
            background: white;
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .scroll-content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 3rem;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) #f1f1f1;
        }

        .text-custom { color: var(--primary); }
        .bg-custom { background-color: var(--primary); }

        .btn-action {
            background-color: var(--primary);
            color: white;
            padding: 1rem 3.5rem;
            border-radius: 99px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            display: inline-block;
        }
        .btn-action:hover:not(:disabled) {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
        }

        .option-card {
            transition: all 0.2s ease;
            border: 2px solid #f1f5f9;
        }
        
        .option-card.selected {
            border-color: var(--primary);
            background-color: #f0fdfa;
        }

        .option-card.locked {
            pointer-events: none;
        }

        .circle-bar { 
            fill: none; 
            stroke: var(--primary); 
            stroke-width: 10; 
            stroke-linecap: round; 
            transition: stroke-dashoffset 1.5s ease-out;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="main-container">
        
        <div id="screen-start" class="scroll-content flex flex-col items-center justify-center text-center animate__animated animate__fadeIn">
            <h1 class="text-5xl font-bold text-custom mb-6 leading-tight">Ejercicio de Repaso 2</h1>
            <p class="mb-4 text-slate-600 font-semibold uppercase tracking-wide">Calidad y Auditoría</p>
            <p class="mb-8 max-w-2xl text-slate-500">¡Bienvenid@ al ejercicio de repaso!</p>
            <button onclick="startQuiz()" class="btn-action text-xl shadow-lg">INICIAR REPASO</button>
        </div>

        <div id="screen-quiz" class="hidden flex flex-col h-full">
            <div class="px-14 pt-10 flex justify-between items-center bg-white z-10">
                <span id="q-number" class="font-bold text-custom text-sm tracking-widest uppercase"></span>
                <div class="w-48 h-2 bg-slate-100 rounded-full overflow-hidden">
                    <div id="progress-fill" class="h-full bg-custom transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>

            <div class="scroll-content">
                <p id="q-instruction" class="text-custom font-bold italic mb-2 text-base"></p>
                <h2 id="q-text" class="text-xl font-bold mb-6 leading-snug"></h2>

                <div id="options-container" class="space-y-3"></div>

                <div id="feedback-box" class="hidden mt-6 p-6 rounded-3xl border-2 animate__animated animate__fadeInUp">
                    <p id="feedback-title" class="font-bold text-xl mb-2"></p>
                    <div id="feedback-body" class="text-base leading-relaxed text-slate-700"></div>
                    <button onclick="nextStep()" class="mt-4 bg-slate-800 text-white px-10 py-2 rounded-xl hover:bg-black transition-all font-bold">Continuar</button>
                </div>

                <button id="btn-validate" onclick="validateAnswer()" class="btn-action w-full mt-8 shadow-xl text-lg">Validar Respuesta</button>
            </div>
        </div>

        <div id="screen-results" class="hidden scroll-content flex flex-col items-center justify-center text-center">
            <h2 class="text-4xl font-bold mb-4">Resultado Final</h2>
            <div class="relative flex items-center justify-center my-6">
                <svg class="w-64 h-64 -rotate-90">
                    <circle cx="128" cy="128" r="110" stroke="#f1f5f9" stroke-width="10" fill="none"></circle>
                    <circle id="final-circle" cx="128" cy="128" r="110" class="circle-bar" stroke-dasharray="691" stroke-dashoffset="691"></circle>
                </svg>
                <div class="absolute text-6xl font-black text-slate-800"><span id="result-percent">0</span>%</div>
            </div>
            <p id="result-score" class="text-2xl font-bold mb-4 text-slate-700"></p>
            <div id="result-msg" class="max-w-2xl mb-8 p-6 bg-slate-50 rounded-3xl italic text-slate-600"></div>
            <button onclick="location.reload()" class="btn-action">Intentar de nuevo</button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                instruction: "Seleccione la respuesta correcta",
                question: "El sistema de salud colombiano, se considera un sistema:",
                options: [
                    {t: "Sistema mixto, cerrado", c: false},
                    {t: "Sistema mixto, abierto", c: true},
                    {t: "Sistema abierto y cerrado", c: false},
                    {t: "Sistema Flexible, cerrado", c: false}
                ],
                feedback: "El sistema de salud colombiano (SGSSS) está regulado por el gobierno nacional. Se caracteriza por ser un modelo de aseguramiento <strong>mixto (público y privado) y abierto</strong>, basado en la solidaridad, cubriendo a los ciudadanos a través de los regímenes contributivo y subsidiado."
            },
            {
                instruction: "Seleccione la respuesta correcta",
                question: "Los sistemas de salud se clasifican en:",
                options: [
                    {t: "Supra sistemas y subsistemas", c: false},
                    {t: "Cerrados y abiertos", c: true},
                    {t: "Mixtos y abiertos", c: false},
                    {t: "Mixtos y cerrados", c: false}
                ],
                feedback: "Bajo la teoría de sistemas, se clasifican en <strong>abiertos y cerrados</strong> según su interacción con el entorno. Los sistemas abiertos intercambian energía e información con su entorno para adaptarse, mientras los cerrados operan con límites estrictos."
            },
            {
                instruction: "Seleccione la respuesta correcta",
                question: "Un sistema de salud es:",
                options: [
                    {t: "Un conjunto de elementos relacionados entre sí que funcionan como un todo.", c: true},
                    {t: "Son normas, personas, instituciones que fomentan el trabajo en equipo.", c: false},
                    {t: "Son las IPS, EPS, ESE, cuya función principal es prestar servicios de salud.", c: false},
                    {t: "Es la unión de varias empresas para evitar cometer cero errores.", c: false}
                ],
                feedback: "Es el conjunto de organizaciones o <strong>elementos relacionados entre sí que funcionan como un todo</strong>, incluyendo instituciones, recursos humanos, financieros y materiales orientados a mejorar, restaurar o mantener la salud de una población."
            },
            {
                instruction: "Seleccione la respuesta correcta",
                question: "Las herramientas de auditoría de calidad en salud son métodos y técnicas para evaluar procesos; algunas de estas son:",
                options: [
                    {t: "Listas de chequeo, auditoría interna, veredicto", c: false},
                    {t: "Hojas de control, listas de chequeo, auditoría externa", c: false},
                    {t: "Diagrama de Pareto, diagrama de Ishikawa, gráfico de control", c: true},
                    {t: "Gráfico de control, hojas de cálculo y listas de goteo.", c: false}
                ],
                feedback: "El <strong>diagrama de Pareto, de Ishikawa y el gráfico de control</strong> son herramientas básicas de calidad. Ayudan a visualizar, priorizar problemas, analizar causas raíz y monitorear la estabilidad de los procesos."
            },
            {
                instruction: "Seleccione la respuesta correcta",
                question: "Son herramientas cuantitativas y cualitativas que miden aspectos clave de la atención médica (seguridad, efectividad, satisfacción). La definición corresponde a:",
                options: [
                    {t: "Diagrama de Flujo", c: false},
                    {t: "Diagrama de Pareto", c: false},
                    {t: "Histograma", c: false},
                    {t: "Indicadores de salud", c: true}
                ],
                feedback: "Los <strong>indicadores de salud</strong> son variables que miden el estado de salud de una población y el desempeño de los sistemas sanitarios, siendo cruciales para guiar políticas públicas y evaluar resultados."
            },
            {
                instruction: "Seleccione la respuesta correcta",
                question: "Algunos aspectos importantes que se deben tener en cuenta en la auditoría sistémica son:",
                options: [
                    {t: "Identificar las fortalezas y debilidades actuales de la compañía, proveer una visión general y señalar áreas de alto rendimiento.", c: true},
                    {t: "Identificar falencias, alistar listas de chequeo, planear estrategias.", c: false},
                    {t: "Establecer planes de acción, establecer planes de mejoramiento, listas de chequeo.", c: false},
                    {t: "Notificar la auditoría, establecer un acta de inicio y un acta de cierre.", c: false}
                ],
                feedback: "La auditoría sistémica permite <strong>identificar fortalezas</strong> (áreas de alto rendimiento) y <strong>debilidades</strong> para establecer planes de mejoramiento y corregir oportunamente las falencias encontradas."
            },
            {
                instruction: "Seleccione la respuesta correcta",
                question: "El enfoque sistémico en auditoría ve la organización como un todo interconectado con:",
                options: [
                    {t: "Instituciones de salud, Ministerio de salud y Super salud.", c: false},
                    {t: "IPS, EPS, Ministerio de salud", c: false},
                    {t: "Departamentos, personas, procesos, que interactúan entre sí. Como un todo.", c: true},
                    {t: "Procesos de salud, papeles de trabajo, lista de chequeo.", c: false}
                ],
                feedback: "Este enfoque ve la organización como un <strong>todo interconectado</strong> donde departamentos, personas y procesos interactúan entre sí para fortalecer el rendimiento de la empresa."
            },
            {
                instruction: "Seleccione la respuesta correcta",
                question: "La auditoría sistémica es:",
                options: [
                    {t: "Un procedimiento exhaustivo y detallado para evaluar y aclarar el funcionamiento de los sistemas de negocios (una fotografía de la empresa).", c: true},
                    {t: "La auditoría que se basa en evidencias y papeles de trabajo.", c: false},
                    {t: "Evalúa la calidad en la prestación de Servicios de salud.", c: false},
                    {t: "Establece planes de mejoramiento y mejora continua.", c: false}
                ],
                feedback: "Es un proceso estructurado que evalúa la <strong>eficiencia, seguridad y fiabilidad</strong> de los sistemas de información y controles internos, asegurando la integridad de los datos y el cumplimiento normativo."
            },
            {
                instruction: "Seleccione la respuesta correcta",
                question: "Un sistema está compuesto por cuatro elementos:",
                options: [
                    {t: "Auditoría, control interno, planes de trabajo.", c: false},
                    {t: "Papeles de trabajo, entradas, veredictos, salidas.", c: false},
                    {t: "Listas de chequeo, método inductivo, método deductivo.", c: false},
                    {t: "Entrada, proceso, salida y retroalimentación", c: true}
                ],
                feedback: "Las partes fundamentales son: <strong>entrada</strong> (recursos), <strong>proceso</strong> (transformación), <strong>salida</strong> (resultados) y <strong>retroalimentación</strong> (ajuste basado en resultados)."
            },
            {
                instruction: "Seleccione la respuesta correcta",
                question: "¿Qué organización establece que la calidad en salud es clave para los ODS y garantiza cobertura sanitaria efectiva?",
                options: [
                    {t: "OPS", c: false},
                    {t: "ONU", c: false},
                    {t: "MEN", c: false},
                    {t: "OMS", c: true}
                ],
                feedback: "La <strong>OMS</strong> define la calidad en salud como el grado en que los servicios aumentan la probabilidad de resultados deseados basados en evidencia, enfocándose en una atención segura, efectiva y equitativa."
            }
        ];

        let currentIdx = 0;
        let score = 0;

        function startQuiz() {
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-quiz').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = quizData[currentIdx];
            document.getElementById('q-number').innerText = `PREGUNTA ${currentIdx + 1}/${quizData.length}`;
            document.getElementById('progress-fill').style.width = `${((currentIdx + 1)/quizData.length)*100}%`;
            document.getElementById('q-instruction').innerText = q.instruction;
            document.getElementById('q-text').innerText = q.question;
            document.getElementById('feedback-box').classList.add('hidden');
            document.getElementById('btn-validate').classList.remove('hidden');
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            q.options.forEach((opt, i) => {
                const d = document.createElement('div');
                d.className = "option-card flex items-center p-4 rounded-2xl cursor-pointer hover:bg-slate-50";
                d.innerHTML = `
                    <input type="radio" name="ans" id="o${i}" value="${i}" class="w-5 h-5 accent-[#004F67]">
                    <label for="o${i}" class="ml-4 w-full cursor-pointer font-medium text-lg text-slate-700">${opt.t}</label>
                `;
                d.onclick = () => {
                    if (d.classList.contains('locked')) return;
                    document.querySelectorAll('.option-card').forEach(el => el.classList.remove('selected'));
                    d.classList.add('selected');
                    d.querySelector('input').checked = true;
                };
                container.appendChild(d);
            });
        }

        function validateAnswer() {
            const q = quizData[currentIdx];
            const sel = document.querySelector('input[name="ans"]:checked');
            
            if(!sel) return;

            document.querySelectorAll('.option-card').forEach(el => el.classList.add('locked'));
            
            const isCorrect = q.options[sel.value].c;
            if(isCorrect) score++;
            
            const fBox = document.getElementById('feedback-box');
            fBox.classList.remove('hidden', 'bg-green-50', 'border-green-200', 'bg-red-50', 'border-red-200');
            document.getElementById('btn-validate').classList.add('hidden');

            const fTitle = document.getElementById('feedback-title');
            if(isCorrect) {
                fTitle.innerText = "¡Correcto!";
                fTitle.className = "font-bold text-xl text-green-700 mb-1";
                fBox.classList.add('bg-green-50', 'border-green-200');
            } else {
                fTitle.innerText = "Respuesta Incorrecta";
                fTitle.className = "font-bold text-xl text-red-700 mb-1";
                fBox.classList.add('bg-red-50', 'border-red-200');
            }
            
            document.getElementById('feedback-body').innerHTML = q.feedback;
        }

        function nextStep() {
            currentIdx++;
            if(currentIdx < quizData.length) {
                renderQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('screen-quiz').classList.add('hidden');
            document.getElementById('screen-results').classList.remove('hidden');
            
            const percent = Math.round((score / quizData.length) * 100);
            const circle = document.getElementById('final-circle');
            const circumference = 691; 
            
            setTimeout(() => {
                const offset = circumference - (percent / 100) * circumference;
                circle.style.strokeDashoffset = offset;
                
                let count = 0;
                const timer = setInterval(() => {
                    if(count >= percent) {
                        document.getElementById('result-percent').innerText = percent;
                        clearInterval(timer);
                    } else {
                        count++;
                        document.getElementById('result-percent').innerText = count;
                    }
                }, 20);
            }, 300);

            document.getElementById('result-score').innerText = `Puntaje: ${score} de ${quizData.length}`;
            const msg = document.getElementById('result-msg');
            
            if(percent === 100) msg.innerHTML = "¡Excelente! Has comprendido perfectamente los conceptos de sistemas y auditoría de la unidad 2.";
            else if(percent >= 70) msg.innerHTML = "¡Buen trabajo! Tienes bases sólidas, pero revisa los puntos donde fallaste para mayor claridad.";
            else msg.innerHTML = "Es importante repasar los conceptos de sistemas abiertos/cerrados y las partes de un sistema (Entrada, Proceso, Salida, Retroalimentación).";
        }
    </script>
</body>
</html>
