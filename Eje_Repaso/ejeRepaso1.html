<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repaso: Auditoría Sistémica</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --primary: #004F67;
            --primary-dark: #00779A;
        }

        body {
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            line-height: 1.6;
            color: #004F67;
            background-color: #f0f5f5;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        #main-container {
            width: 95%;
            max-width: 1000px;
            height: 850px; 
            background: white;
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .scroll-content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 3rem;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) #f1f1f1;
        }

        .text-custom { color: var(--primary); }
        .bg-custom { background-color: var(--primary); }

        .btn-action {
            background-color: var(--primary);
            color: white;
            padding: 1rem 3.5rem;
            border-radius: 99px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            display: inline-block;
        }
        .btn-action:hover:not(:disabled) {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
        }
        .btn-action:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .option-card {
            transition: all 0.2s ease;
            border: 2px solid #f1f5f9;
        }
        
        .option-card.selected {
            border-color: var(--primary);
            background-color: #f0fdfa;
        }

        .option-card.locked {
            pointer-events: none;
        }

        .circle-bar { 
            fill: none; 
            stroke: var(--primary); 
            stroke-width: 10; 
            stroke-linecap: round; 
            transition: stroke-dashoffset 1.5s ease-out;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="main-container">
        
        <div id="screen-start" class="scroll-content flex flex-col items-center justify-center text-center animate__animated animate__fadeIn">
            <h1 class="text-5xl font-bold text-custom mb-6 leading-tight">Ejercicios de Repaso</h1>
            <p class="mb-4 text-slate-600 font-semibold uppercase tracking-wider">Auditoría Sistémica</p>
            <div class="mb-12 max-w-2xl text-slate-500 bg-slate-50 p-6 rounded-3xl border border-slate-100">
                ¡Bienvenid@ al ejercicio de repaso!
            </div>
            <button onclick="startQuiz()" class="btn-action text-xl shadow-lg">INICIAR REPASO</button>
        </div>

        <div id="screen-quiz" class="hidden flex flex-col h-full">
            <div class="px-14 pt-10 flex justify-between items-center bg-white z-10">
                <span id="q-number" class="font-bold text-custom text-sm tracking-widest uppercase"></span>
                <div class="w-48 h-2 bg-slate-100 rounded-full overflow-hidden">
                    <div id="progress-fill" class="h-full bg-custom transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>

            <div class="scroll-content">
                <p id="q-instruction" class="text-custom font-bold italic mb-2 text-base"></p>
                <h2 id="q-text" class="text-xl font-bold mb-6 leading-snug"></h2>

                <div id="options-container" class="space-y-3"></div>

                <div id="feedback-box" class="hidden mt-6 p-6 rounded-3xl border-2 animate__animated animate__fadeInUp">
                    <p id="feedback-title" class="font-bold text-xl mb-2"></p>
                    <div id="feedback-body" class="text-base leading-relaxed text-slate-700"></div>
                    <button onclick="nextStep()" class="mt-4 bg-slate-800 text-white px-10 py-2 rounded-xl hover:bg-black transition-all font-bold">Continuar</button>
                </div>

                <button id="btn-validate" onclick="validateAnswer()" class="btn-action w-full mt-8 shadow-xl text-lg">Validar Respuesta</button>
            </div>
        </div>

        <div id="screen-results" class="hidden scroll-content flex flex-col items-center justify-center text-center">
            <h2 class="text-4xl font-bold mb-4">Resultado Final</h2>
            <div class="relative flex items-center justify-center my-6">
                <svg class="w-64 h-64 -rotate-90">
                    <circle cx="128" cy="128" r="110" stroke="#f1f5f9" stroke-width="10" fill="none"></circle>
                    <circle id="final-circle" cx="128" cy="128" r="110" class="circle-bar" stroke-dasharray="691" stroke-dashoffset="691"></circle>
                </svg>
                <div class="absolute text-6xl font-black text-slate-800"><span id="result-percent">0</span>%</div>
            </div>
            <p id="result-score" class="text-2xl font-bold mb-4 text-slate-700"></p>
            <div id="result-msg" class="max-w-2xl mb-8 p-6 bg-slate-50 rounded-3xl italic text-slate-600"></div>
            <button onclick="location.reload()" class="btn-action">Intentar de nuevo</button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                instruction: "Seleccione Verdadero o Falso",
                question: "El fin primordial de la auditoría sistémica es obtener resultados que revelan la ejecución de la auditoria a los sistemas de información, optimizan la gestión gerencial y proponen planes de acciones correctivas.",
                options: [{t: "Verdadero", c: true}, {t: "Falso", c: false}],
                feedback: "Correcto. Estas acciones permiten fortalecer el sistema de control interno en estricto apego al mapa estratégico organizacional."
            },
            {
                instruction: "Seleccione Verdadero o Falso",
                question: "Tres ejemplos de la auditoría sistémica son: la auditoría de seguridad, la auditoría de cumplimiento y la auditoría de infraestructura tecnológica.",
                options: [{t: "Verdadero", c: true}, {t: "Falso", c: false}],
                feedback: "Correcto. Estos ejemplos cubren la protección de datos, leyes locales (GDPR) y la verificación de redes y servidores."
            },
            {
                instruction: "Seleccione Verdadero o Falso",
                question: "La auditoría sistémica es la única que se basa en evidencias y para su realización se utiliza el ciclo PHVA.",
                options: [{t: "Verdadero", c: false}, {t: "Falso", c: true}],
                feedback: "La auditoría sistémica <strong>no es la única</strong> que se basa en evidencias; todas las auditorías deben basarse en evidencias objetivas para su validez."
            },
            {
                instruction: "Seleccione Verdadero o Falso",
                question: "La auditoría a los Sistemas de Información (SI) permite evaluar hechos y evidencias tangibles e intangibles del entorno informático.",
                options: [{t: "Verdadero", c: true}, {t: "Falso", c: false}],
                feedback: "Correcto. Permite alternativas de análisis donde se evalúan las acciones llevadas a cabo tanto dentro como fuera del lugar de los hechos."
            },
            {
                instruction: "Seleccione Verdadero o Falso",
                question: "La auditoría sistémica se puede considerar como un tipo de auditoría de control interno.",
                options: [{t: "Verdadero", c: true}, {t: "Falso", c: false}],
                feedback: "Correcto. Forma parte de los mecanismos para asegurar que los procesos y sistemas operen bajo los estándares establecidos."
            },
            {
                instruction: "Seleccione Verdadero o Falso",
                question: "La auditoría sistémica se hace específicamente en el momento que se esté prestando un servicio.",
                options: [{t: "Verdadero", c: false}, {t: "Falso", c: true}],
                feedback: "No siempre se hace durante la prestación. La auditoría que se realiza en el momento del servicio se denomina <strong>auditoría concurrente o en caliente</strong>."
            },
            {
                instruction: "Seleccione Verdadero o Falso",
                question: "Una auditoría sistémica es una fotografía de una empresa que muestra el modo exacto en que se producen los sistemas y los pasos que deben ejecutarse.",
                options: [{t: "Verdadero", c: true}, {t: "Falso", c: false}],
                feedback: "Correcto. Funciona como un diagnóstico detallado del estado y funcionamiento actual de los sistemas organizacionales."
            },
            {
                instruction: "Seleccione Verdadero o Falso",
                question: "Tres aspectos para ejecutarla son: señalar áreas de alto rendimiento, identificar limitaciones actuales y determinar el modo en que pueden ser abordadas.",
                options: [{t: "Verdadero", c: true}, {t: "Falso", c: false}],
                feedback: "Correcto. Estos aspectos permiten orientar la auditoría hacia la mejora continua del rendimiento organizacional."
            },
            {
                instruction: "Seleccione Verdadero o Falso",
                question: "El veredicto al finalizar la auditoría sistémica siempre debe ser favorable.",
                options: [{t: "Verdadero", c: false}, {t: "Falso", c: true}],
                feedback: "El veredicto <strong>no siempre debe ser favorable</strong>; este depende estrictamente de las evidencias encontradas y los soportes relacionados durante el proceso."
            },
            {
                instruction: "Seleccione Verdadero o Falso",
                question: "Al finalizar una auditoría sistémica no se debe dejar un plan de mejoramiento.",
                options: [{t: "Verdadero", c: false}, {t: "Falso", c: true}],
                feedback: "Falso. Se debe dejar un plan de mejoramiento siempre que se requiera corregir falencias o cuando la auditoría se haya aprobado con condiciones."
            }
        ];

        let currentIdx = 0;
        let score = 0;

        function startQuiz() {
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-quiz').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = quizData[currentIdx];
            document.getElementById('q-number').innerText = `PREGUNTA ${currentIdx + 1}/${quizData.length}`;
            document.getElementById('progress-fill').style.width = `${((currentIdx + 1)/quizData.length)*100}%`;
            document.getElementById('q-instruction').innerText = q.instruction;
            document.getElementById('q-text').innerText = q.question;
            document.getElementById('feedback-box').classList.add('hidden');
            document.getElementById('btn-validate').classList.remove('hidden');
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            q.options.forEach((opt, i) => {
                const d = document.createElement('div');
                d.className = "option-card flex items-center p-4 rounded-2xl cursor-pointer hover:bg-slate-50";
                d.innerHTML = `
                    <input type="radio" name="ans" id="o${i}" value="${i}" class="w-5 h-5 accent-[#004F67]">
                    <label for="o${i}" class="ml-4 w-full cursor-pointer font-medium text-lg">${opt.t}</label>
                `;
                d.onclick = () => {
                    if (d.classList.contains('locked')) return;
                    document.querySelectorAll('.option-card').forEach(el => el.classList.remove('selected'));
                    d.classList.add('selected');
                    d.querySelector('input').checked = true;
                };
                container.appendChild(d);
            });
        }

        function validateAnswer() {
            const q = quizData[currentIdx];
            const sel = document.querySelector('input[name="ans"]:checked');
            
            if(!sel) return;

            document.querySelectorAll('.option-card').forEach(el => el.classList.add('locked'));
            
            const isCorrect = q.options[sel.value].c;
            if(isCorrect) score++;
            
            const fBox = document.getElementById('feedback-box');
            fBox.classList.remove('hidden', 'bg-green-50', 'border-green-200', 'bg-red-50', 'border-red-200');
            document.getElementById('btn-validate').classList.add('hidden');

            const fTitle = document.getElementById('feedback-title');
            if(isCorrect) {
                fTitle.innerText = "¡Correcto!";
                fTitle.className = "font-bold text-xl text-green-700 mb-1";
                fBox.classList.add('bg-green-50', 'border-green-200');
            } else {
                fTitle.innerText = "Incorrecto";
                fTitle.className = "font-bold text-xl text-red-700 mb-1";
                fBox.classList.add('bg-red-50', 'border-red-200');
            }
            
            document.getElementById('feedback-body').innerHTML = q.feedback;
        }

        function nextStep() {
            currentIdx++;
            if(currentIdx < quizData.length) {
                renderQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('screen-quiz').classList.add('hidden');
            document.getElementById('screen-results').classList.remove('hidden');
            
            const percent = Math.round((score / quizData.length) * 100);
            const circle = document.getElementById('final-circle');
            const circumference = 691; 
            
            setTimeout(() => {
                const offset = circumference - (percent / 100) * circumference;
                circle.style.strokeDashoffset = offset;
                
                let count = 0;
                const timer = setInterval(() => {
                    if(count >= percent) {
                        document.getElementById('result-percent').innerText = percent;
                        clearInterval(timer);
                    } else {
                        count++;
                        document.getElementById('result-percent').innerText = count;
                    }
                }, 15);
            }, 300);

            document.getElementById('result-score').innerText = `Puntaje: ${score} de ${quizData.length}`;
            const msg = document.getElementById('result-msg');
            
            if(percent === 100) msg.innerHTML = "¡Excelente! Posees un dominio total sobre los conceptos de Auditoría Sistémica.";
            else if(percent >= 70) msg.innerHTML = "¡Buen trabajo! Tienes claros los fundamentos de la auditoría y sus procesos.";
            else msg.innerHTML = "Te recomendamos repasar los conceptos de auditoría concurrente, veredictos y el uso de evidencias en los procesos sistémicos.";
        }
    </script>
</body>
</html>
