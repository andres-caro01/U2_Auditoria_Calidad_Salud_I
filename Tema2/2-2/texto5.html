<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gráfico Interactivo de Quejas</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>  
  
body{
font-family: Arial, sans-serif;
background:#e9e9e9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
width:900px;
}

h2{
text-align:center;
margin-bottom:20px;
}

canvas{
width:100%;
}

</style>
</head>

<body>

<div class="container">

<h2>Aumento de las quejas y reclamos hechas por los clientes</h2>

<canvas id="paretoChart"></canvas>

</div>

<script>

const labels = ["Q1","Q2","Q3","Q4","Q5","Q6","Q7","Q8","Q9","Q10"];

const frecuencia = [26,20,16,9,4,3,3,2,2,1];

const acumulado = [30,53,72,83,88,91,95,97,99,100];

const ctx = document.getElementById('paretoChart');

new Chart(ctx, {

type: 'bar',

data: {
labels: labels,
datasets: [

 
{
label: 'Frecuencia',
data: frecuencia,
backgroundColor: '#2a8aa5',
yAxisID: 'y',
order: 2
},

{
label: 'Porcentaje acumulado',
data: acumulado,
type: 'line',
borderColor: '#1c5a6b',
backgroundColor: '#1c5a6b',
borderWidth: 3,
fill: false,
tension: 0.3,
pointRadius: 5,
pointHoverRadius:7,
yAxisID: 'y1',
order: 1
}

]
},

options: {

responsive: true,

interaction: {
mode: 'index',
intersect: false
},

plugins: {
legend: {
position: 'bottom'
},
tooltip: {
enabled: true
}
},

animations: {

y: {
duration: 2000,
easing: 'easeOutQuart',
from: 0
}

},

scales: {

y: {
title: {
display: true,
text: 'Aumento de quejas'
},
beginAtZero: true
},

y1: {
position: 'right',
title: {
display: true,
text: 'Porcentaje acumulado'
},
min:0,
max:100,
grid:{
drawOnChartArea:false
},
ticks:{
callback: function(value){
return value + "%";
}
}
}

}

}

});

</script>

</body>
</html>
