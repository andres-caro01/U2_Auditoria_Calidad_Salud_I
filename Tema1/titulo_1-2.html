<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Título Animado Centrado</title>
  <link href="https://fonts.googleapis.com/css?family=Lato:900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Lato', sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center; /* Centrado horizontal del contenedor */
      align-items: center;     /* Centrado vertical del contenedor */
      background: transparent;
      overflow: hidden;        /* Evita scrolls innecesarios */
    }

    .container {
      /* 👇 AJUSTE DE ANCHO: 90% de la pantalla */
      width: 90%; 
      
      /* 👇 ESPACIO LATERAL: Margen de 30px (se nota en pantallas pequeñas) */
      max-width: calc(100% - 60px); 
      
      margin: 0 auto;
      text-align: center; /* 👈 TEXTO CENTRADO */
    }

    h1 {
      /* 👇 TAMAÑO DE LETRA */
      font-size: 42px; 
      font-weight: 900;
      line-height: 1.2em; 
      margin: 0;
      white-space: pre-wrap; 
      word-wrap: break-word;
      color: #000000;
      /* mix-blend-mode eliminado para asegurar visibilidad sobre cualquier fondo en Gamma */
    }

    /* Estilo para cada letra animada */
    h1 span {
      display: inline-block;
      opacity: 0;
      transform: translateY(-100px);
      animation: one .5s forwards;
    }

    @keyframes one {
      0%   { transform: translateY(-100px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1 id="titulo"></h1>
  </div>

  <script>
    // 👇 CAMBIA EL TEXTO AQUÍ
    const texto = "1.2 Cerrados y Abiertos";

    const titulo = document.getElementById("titulo");

    function crearAnimacion(text) {
      titulo.innerHTML = ""; 
      [...text].forEach((letra, i) => {
        const span = document.createElement("span");
        span.textContent = letra === " " ? "\u00A0" : letra;
        
        // 👇 VELOCIDAD DE APARICIÓN: 0.05s por letra
        span.style.animationDelay = `${i * 0.05}s`; 
        
        titulo.appendChild(span);
      });
    }

    // Iniciar animación
    crearAnimacion(texto);

    // Reiniciar al entrar en vista (Intersection Observer)
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          crearAnimacion(texto);
        }
      });
    }, { threshold: 0.5 });

    observer.observe(titulo);
  </script>
</body>
</html>
