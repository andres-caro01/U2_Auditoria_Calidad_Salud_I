<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Título Animado One</title>
  <link href="https://fonts.googleapis.com/css?family=Lato:900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Lato', sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;          /* pantalla completa */
      display: flex;
      justify-content: center;    /* centrar horizontal */
      align-items: center;        /* centrar vertical */
      background: transparent;
      color: #000000;
    }

    .container {
      max-width: 900px;   /* 👈 igual que en el primer código */
      width: 90%;         /* 👈 adaptable en pantallas pequeñas */
      margin: 0 auto;
      text-align: left;   /* 👈 texto alineado a la izquierda */
    }

    h1 {
      font-size: 32px;    /* tamaño de letra */
      font-weight: 900;
      line-height: 1.9em; /* 👈 espacio entre líneas */
      white-space: pre-wrap; /* 👈 permitir saltos de línea */
      word-wrap: break-word; /* 👈 ajuste automático */
      mix-blend-mode: difference;
      color: 000;
    }

    h1 span {
      display: inline-block;
      opacity: 0;
      transform: translateY(-100px);
      animation: one .5s forwards;
    }

    @keyframes one {
      0%   { transform: translateY(-100px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="titulo"></h1>
  </div>

  <script>
    // 👇 SOLO CAMBIA ESTA LÍNEA PARA EDITAR EL TEXTO
    const texto = "1.2 Cerrados y Abiertos";

    const titulo = document.getElementById("titulo");

    function crearAnimacion(texto) {
      titulo.innerHTML = ""; // limpiar antes de recrear
      [...texto].forEach((letra, i) => {
        const span = document.createElement("span");
        span.textContent = letra === " " ? "\u00A0" : letra;
        span.style.animationDelay = `${i * 0.05}s`; // más fluido
        titulo.appendChild(span);
      });
    }

    // Animación inicial
    crearAnimacion(texto);

    // Reinicia animación cada vez que entra en pantalla
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          crearAnimacion(texto);
        }
      });
    }, { threshold: 0.5 });

    observer.observe(titulo);
  </script>
</body>
</html>
